<text x="78" y="76" class="eyebrow">SIGNAL ATLAS · DESIGN DIAGRAM</text><text x="78" y="128" class="title">Reference System Architecture</text><text x="78" y="163" class="sub">A local-first TypeScript stack with strict contracts between world, evidence, and agent runtimes.</text><rect x="65" y="225" width="380" height="560" rx="24" fill="#111a2b" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><rect x="65" y="225" width="380" height="7" rx="3" fill="#66d9db"/><text x="90" y="270" class="eyebrow" text-anchor="start">CLIENT</text><text x="90" y="299" class="sub" text-anchor="start">Player-facing experience</text><rect x="610" y="225" width="380" height="560" rx="24" fill="#111a2b" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><rect x="610" y="225" width="380" height="7" rx="3" fill="#ffc963"/><text x="635" y="270" class="eyebrow" text-anchor="start">ORCHESTRATOR</text><text x="635" y="299" class="sub" text-anchor="start">Deterministic world authority</text><rect x="1155" y="225" width="380" height="560" rx="24" fill="#111a2b" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><rect x="1155" y="225" width="380" height="7" rx="3" fill="#b49af4"/><text x="1180" y="270" class="eyebrow" text-anchor="start">RUNTIMES + DATA</text><text x="1180" y="299" class="sub" text-anchor="start">Bounded external intelligence</text><rect x="90" y="330" width="330" height="105" rx="14" fill="#19253b" stroke="#66d9db" stroke-opacity=".45" stroke-width="2"/><text x="108" y="364" class="label" text-anchor="start">React + Vite shell</text><text x="108" y="392" class="body" text-anchor="start"><tspan x="108" dy="0">Market ribbon · docks · overlays</tspan><tspan x="108" dy="21">command desk · accessibility</tspan></text><rect x="90" y="460" width="330" height="105" rx="14" fill="#19253b" stroke="#66d9db" stroke-opacity=".45" stroke-width="2"/><text x="108" y="494" class="label" text-anchor="start">Phaser world scene</text><text x="108" y="522" class="body" text-anchor="start"><tspan x="108" dy="0">Tilemap · pathing · sprites</tspan><tspan x="108" dy="21">weather · camera · input</tspan></text><rect x="90" y="590" width="330" height="105" rx="14" fill="#19253b" stroke="#66d9db" stroke-opacity=".45" stroke-width="2"/><text x="108" y="624" class="label" text-anchor="start">Client event projector</text><text x="108" y="652" class="body" text-anchor="start"><tspan x="108" dy="0">Consumes canonical events</tspan><tspan x="108" dy="21">renders optimistic UI safely</tspan></text><rect x="635" y="330" width="330" height="105" rx="14" fill="#19253b" stroke="#ffc963" stroke-opacity=".45" stroke-width="2"/><text x="653" y="364" class="label" text-anchor="start">Fastify API + WebSocket</text><text x="653" y="392" class="body" text-anchor="start"><tspan x="653" dy="0">Commands in · events out</tspan><tspan x="653" dy="21">auth boundary · rate controls</tspan></text><rect x="635" y="460" width="330" height="105" rx="14" fill="#19253b" stroke="#ffc963" stroke-opacity=".45" stroke-width="2"/><text x="653" y="494" class="label" text-anchor="start">World scheduler</text><text x="653" y="522" class="body" text-anchor="start"><tspan x="653" dy="0">Agent turns · travel clocks</tspan><tspan x="653" dy="21">missions · meetings · replay</tspan></text><rect x="635" y="590" width="330" height="105" rx="14" fill="#19253b" stroke="#ffc963" stroke-opacity=".45" stroke-width="2"/><text x="653" y="624" class="label" text-anchor="start">Domain services</text><text x="653" y="652" class="body" text-anchor="start"><tspan x="653" dy="0">Source normalization · beliefs</tspan><tspan x="653" dy="21">forecast commits · provenance</tspan></text><rect x="1180" y="310" width="330" height="105" rx="14" fill="#19253b" stroke="#b49af4" stroke-opacity=".45" stroke-width="2"/><text x="1198" y="344" class="label" text-anchor="start">Codex Runtime</text><text x="1198" y="372" class="body" text-anchor="start"><tspan x="1198" dy="0">codex exec first</tspan><tspan x="1198" dy="21">mcp-server behind interface</tspan></text><rect x="1180" y="440" width="330" height="105" rx="14" fill="#19253b" stroke="#b49af4" stroke-opacity=".45" stroke-width="2"/><text x="1198" y="474" class="label" text-anchor="start">Pref Gateway</text><text x="1198" y="502" class="body" text-anchor="start"><tspan x="1198" dy="0">MCP tools/resources → SourceRecord</tspan><tspan x="1198" dy="21">capability map + fixture adapter</tspan></text><rect x="1180" y="570" width="155" height="105" rx="14" fill="#19253b" stroke="#7cdda2" stroke-opacity=".45" stroke-width="2"/><text x="1198" y="604" class="label" text-anchor="start">SQLite</text><text x="1198" y="632" class="body" text-anchor="start"><tspan x="1198" dy="0">events</tspan><tspan x="1198" dy="21">sources · beliefs</tspan></text><rect x="1355" y="570" width="155" height="105" rx="14" fill="#19253b" stroke="#d1a76b" stroke-opacity=".45" stroke-width="2"/><text x="1373" y="604" class="label" text-anchor="start">Assets</text><text x="1373" y="632" class="body" text-anchor="start"><tspan x="1373" dy="0">maps · audio</tspan><tspan x="1373" dy="21">fixtures · schemas</tspan></text><path d="M420 512 C500 512 550 512 635 512" class="connector"/><text x="525" y="494" class="tiny" text-anchor="middle">COMMANDS / EVENTS</text><path d="M965 382 C1050 382 1090 362 1180 362" class="connectorGold"/><text x="1070" y="344" class="tiny" text-anchor="middle">STRUCTURED TURNS</text><path d="M965 512 C1050 512 1095 492 1180 492" class="connectorGold"/><text x="1070" y="474" class="tiny" text-anchor="middle">SOURCE REQUESTS</text><path d="M965 642 C1050 642 1090 622 1180 622" class="connector"/><text x="1065" y="604" class="tiny" text-anchor="middle">APPEND-ONLY STATE</text><rect x="150" y="815" width="1300" height="48" rx="14" fill="#121c2d" stroke="#354663" stroke-width="2" /><text x="800" y="846" class="body" text-anchor="middle">Shared Zod / JSON Schema contracts · every external result normalized · every state change emitted as an event</t