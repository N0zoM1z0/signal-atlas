<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Reference System Architecture</title><desc id="desc">A local-first TypeScript stack with strict contracts between world, evidence, and agent runtimes.</desc>
