<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Evidence and Provenance Flow</title><desc id="desc">The canonical path from an MCP response to a player-visible belief update.</desc>
<defs>
 <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
 <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#111a2b"/><stop offset="1" stop-color="#090d16"/></linearGradient>
 <linearGradient id="cyanGrad" x1="0" x2="1"><stop stop-color="#66d9db"/><stop offset="1" stop-color="#2d8d97"/></linearGradient>
 <linearGradient id="goldGrad" x1="0" x2="1"><stop stop-color="#ffc963"/><stop offset="1" stop-color="#b87a32"/></linearGradient>
 <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#66d9db"/></marker>
 <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ffc963"/></marker>
 <style>
  .sans{font-family:Inter,Arial,sans-serif} .mono{font-family:'Courier New',monospace} .title{fill:#eef2eb;font:700 42px Inter,Arial,sans-serif;letter-spacing:-1px} .sub{fill:#9aa9bf;font:18px Inter,Arial,sans-serif} .eyebrow{fill:#66d9db;font:700 13px 'Courier New',monospace;letter-spacing:2px} .label{fill:#eef2eb;font:700 21px Inter,Arial,sans-serif} .body{fill:#a9b5c6;font:16px Inter,Arial,sans-serif} .tiny{fill:#94a3b8;font:700 12px 'Courier New',monospace;letter-spacing:1px} .num{fill:#0b1420;font:900 22px 'Courier New',monospace} .card{fill:#162137;stroke:#354663;stroke-width:2} .connector{fill:none;stroke:#66d9db;stroke-width:4;marker-end:url(#arrowCyan)} .connectorGold{fill:none;stroke:#ffc963;stroke-width:4;marker-end:url(#arrowGold)}
 </style>
</defs><rect width="1600" height="900" fill="url(#bg)"/><circle cx="1320" cy="120" r="360" fill="#284c65" opacity=".12"/><circle cx="220" cy="790" r="360" fill="#5c4630" opacity=".09"/>
<text x="78" y="76" class="eyebrow">SIGNAL ATLAS · DESIGN DIAGRAM</text><text x="78" y="128" class="title">Evidence and Provenance Flow</text><text x="78" y="163" class="sub">The canonical path from an MCP response to a player-visible belief update.</text><rect x="80" y="330" width="220" height="180" rx="18" fill="#162137" stroke="#b49af4" stroke-width="2" filter="url(#shadow)"/><circle cx="108" cy="360" r="18" fill="#b49af4"/><text x="108" y="367" class="num" text-anchor="middle">1</text><text x="100" y="408" class="label" text-anchor="start">Pref primitive</text><text x="100" y="441" class="body" text-anchor="start"><tspan x="100" dy="0">Tool or resource result</tspan><tspan x="100" dy="23">plus retrieval metadata</tspan></text><rect x="340" y="330" width="220" height="180" rx="18" fill="#162137" stroke="#66d9db" stroke-width="2" filter="url(#shadow)"/><circle cx="368" cy="360" r="18" fill="#66d9db"/><text x="368" y="367" class="num" text-anchor="middle">2</text><text x="360" y="408" class="label" text-anchor="start">SourceRecord</text><text x="360" y="441" class="body" text-anchor="start"><tspan x="360" dy="0">Immutable source identity</tspan><tspan x="360" dy="23">timestamps · hash · class</tspan></text><rect x="600" y="330" width="220" height="180" rx="18" fill="#162137" stroke="#ffc963" stroke-width="2" filter="url(#shadow)"/><circle cx="628" cy="360" r="18" fill="#ffc963"/><text x="628" y="367" class="num" text-anchor="middle">3</text><text x="620" y="408" class="label" text-anchor="start">Claim extraction</text><text x="620" y="441" class="body" text-anchor="start"><tspan x="620" dy="0">Atomic statement</tspan><tspan x="620" dy="23">support · contradiction</tspan></text><rect x="860" y="330" width="220" height="180" rx="18" fill="#162137" stroke="#7cdda2" stroke-width="2" filter="url(#shadow)"/><circle cx="888" cy="360" r="18" fill="#7cdda2"/><text x="888" y="367" class="num" text-anchor="middle">4</text><text x="880" y="408" class="label" text-anchor="start">Signal card</text><text x="880" y="441" class="body" text-anchor="start"><tspan x="880" dy="0">Impact · confidence</tspan><tspan x="880" dy="23">freshness · known-by</tspan></text><rect x="1120" y="330" width="220" height="180" rx="18" fill="#162137" stroke="#f07872" stroke-width="2" filter="url(#shadow)"/><circle cx="1148" cy="360" r="18" fill="#f07872"/><text x="1148" y="367" class="num" text-anchor="middle">5</text><text x="1140" y="408" class="label" text-anchor="start">Belief update</text><text x="1140" y="441" class="body" text-anchor="start"><tspan x="1140" dy="0">Prior → posterior</tspan><tspan x="1140" dy="23">linked rationale</tspan></text><rect x="1380" y="330" width="140" height="180" rx="18" fill="#162137" stroke="#d1a76b" stroke-width="2" filter="url(#shadow)"/><circle cx="1408" cy="360" r="18" fill="#d1a76b"/><text x="1408" y="367" class="num" text-anchor="middle">6</text><text x="1400" y="408" class="label" text-anchor="start">Replay</text><text x="1400" y="441" class="body" text-anchor="start"><tspan x="1400" dy="0">Event trail</tspan><tspan x="1400" dy="23">calibration</tspan></text><path d="M308 420 L328 420" class="connector"/><path d="M568 420 L588 420" class="connector"/><path d="M828 420 L848 420" class="connector"/><path d="M1088 420 L1108 420" class="connector"/><path d="M1348 420 L1368 420" class="connector"/><rect x="180" y="590" width="1240" height="155" rx="20" fill="#121b2c" stroke="#354663" stroke-width="2" /><circle cx="208" cy="630" r="6" fill="#66d9db" filter="url(#glow)"/><text x="224" y="635" class="tiny" text-anchor="start">SOURCE IDENTITY</text><text x="224" y="663" class="body" text-anchor="start"><tspan x="224" dy="0">Never merge records by headline al</tspan><tspan x="224" dy="20">one.</tspan></text><circle cx="449" cy="630" r="6" fill="#66d9db" filter="url(#glow)"/><text x="465" y="635" class="tiny" text-anchor="start">LINEAGE</text><text x="465" y="663" class="body" text-anchor="start"><tspan x="465" dy="0">Mark derivative reports that share</tspan><tspan x="465" dy="20"> a primary source.</tspan></text><circle cx="690" cy="630" r="6" fill="#66d9db" filter="url(#glow)"/><text x="706" y="635" class="tiny" text-anchor="start">FRESHNESS</text><text x="706" y="663" class="body" text-anchor="start"><tspan x="706" dy="0">Show published, observed, and retr</tspan><tspan x="706" dy="20">ieved times separately.</tspan></text><circle cx="931" cy="630" r="6" fill="#66d9db" filter="url(#glow)"/><text x="947" y="635" class="tiny" text-anchor="start">EVIDENCE BINDING</text><text x="947" y="663" class="body" text-anchor="start"><tspan x="947" dy="0">Professor and agents may cite only</tspan><tspan x="947" dy="20"> supplied records.</tspan></text><circle cx="1172" cy="630" r="6" fill="#66d9db" filter="url(#glow)"/><text x="1188" y="635" class="tiny" text-anchor="start">AUDITABILITY</text><text x="1188" y="663" class="body" text-anchor="start"><tspan x="1188" dy="0">Every forecast commit links eviden</tspan><tspan x="1188" dy="20">ce, rationale, and actor.</tspan></text><text x="800" y="795" class="sub" text-anchor="middle">Design rule: confidence belongs to a claim in context - never to a floating text snippet.</text></svg>