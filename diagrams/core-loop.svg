<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">The Player-Visible Forecasting Loop</title><desc id="desc">Research becomes movement; evidence becomes objects; belief change becomes a legible story.</desc>
<defs>
 <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity=".35"/></filter>
 <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
 <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#111a2b"/><stop offset="1" stop-color="#090d16"/></linearGradient>
 <linearGradient id="cyanGrad" x1="0" x2="1"><stop stop-color="#66d9db"/><stop offset="1" stop-color="#2d8d97"/></linearGradient>
 <linearGradient id="goldGrad" x1="0" x2="1"><stop stop-color="#ffc963"/><stop offset="1" stop-color="#b87a32"/></linearGradient>
 <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#66d9db"/></marker>
 <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#ffc963"/></marker>
 <style>
  .sans{font-family:Inter,Arial,sans-serif} .mono{font-family:'Courier New',monospace} .title{fill:#eef2eb;font:700 42px Inter,Arial,sans-serif;letter-spacing:-1px} .sub{fill:#9aa9bf;font:18px Inter,Arial,sans-serif} .eyebrow{fill:#66d9db;font:700 13px 'Courier New',monospace;letter-spacing:2px} .label{fill:#eef2eb;font:700 21px Inter,Arial,sans-serif} .body{fill:#a9b5c6;font:16px Inter,Arial,sans-serif} .tiny{fill:#94a3b8;font:700 12px 'Courier New',monospace;letter-spacing:1px} .num{fill:#0b1420;font:900 22px 'Courier New',monospace} .card{fill:#162137;stroke:#354663;stroke-width:2} .connector{fill:none;stroke:#66d9db;stroke-width:4;marker-end:url(#arrowCyan)} .connectorGold{fill:none;stroke:#ffc963;stroke-width:4;marker-end:url(#arrowGold)}
 </style>
</defs><rect width="1600" height="900" fill="url(#bg)"/><circle cx="1320" cy="120" r="360" fill="#284c65" opacity=".12"/><circle cx="220" cy="790" r="360" fill="#5c4630" opacity=".09"/>
<text x="78" y="76" class="eyebrow">SIGNAL ATLAS · DESIGN DIAGRAM</text><text x="78" y="128" class="title">The Player-Visible Forecasting Loop</text><text x="78" y="163" class="sub">Research becomes movement; evidence becomes objects; belief change becomes a legible story.</text><path d="M360 398 C420 345 420 320 470 304" class="connectorGold" opacity=".75"/><path d="M690 304 C735 304 755 304 800 304" class="connector" opacity=".75"/><path d="M1020 304 C1090 320 1100 345 1130 398" class="connector" opacity=".75"/><path d="M1220 500 C1165 555 1090 610 1020 625" class="connector" opacity=".75"/><path d="M800 635 C750 635 730 635 690 635" class="connector" opacity=".75"/><path d="M470 625 C355 590 285 530 260 500" class="connectorGold" opacity=".75"/><rect x="180" y="380" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="208" cy="409" r="18" fill="#ffc963"/><text x="208" y="416" class="num" text-anchor="middle">1</text><text x="234" y="404" class="tiny" text-anchor="start">MARKET</text><text x="202" y="445" class="label" text-anchor="start">Choose a market</text><text x="202" y="474" class="body" text-anchor="start"><tspan x="202" dy="0">Enter a handcrafted expedition</tspan><tspan x="202" dy="22">with a visible time horizon.</tspan></text><rect x="470" y="255" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="498" cy="284" r="18" fill="#66d9db"/><text x="498" y="291" class="num" text-anchor="middle">2</text><text x="524" y="279" class="tiny" text-anchor="start">MOVE</text><text x="492" y="320" class="label" text-anchor="start">Dispatch agents</text><text x="492" y="349" class="body" text-anchor="start"><tspan x="492" dy="0">Send specialists to places</tspan><tspan x="492" dy="22">where relevant evidence lives.</tspan></text><rect x="800" y="255" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="828" cy="284" r="18" fill="#7cdda2"/><text x="828" y="291" class="num" text-anchor="middle">3</text><text x="854" y="279" class="tiny" text-anchor="start">LEARN</text><text x="822" y="320" class="label" text-anchor="start">Collect signal cards</text><text x="822" y="349" class="body" text-anchor="start"><tspan x="822" dy="0">Pref-backed records become</tspan><tspan x="822" dy="22">inspectable, sourced evidence.</tspan></text><rect x="1130" y="380" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="1158" cy="409" r="18" fill="#b49af4"/><text x="1158" y="416" class="num" text-anchor="middle">4</text><text x="1184" y="404" class="tiny" text-anchor="start">SYNTHESIZE</text><text x="1152" y="445" class="label" text-anchor="start">Meet and challenge</text><text x="1152" y="474" class="body" text-anchor="start"><tspan x="1152" dy="0">Agents share evidence, surface</tspan><tspan x="1152" dy="22">disagreement, and avoid duplicates.</tspan></text><rect x="800" y="585" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="828" cy="614" r="18" fill="#f07872"/><text x="828" y="621" class="num" text-anchor="middle">5</text><text x="854" y="609" class="tiny" text-anchor="start">FORECAST</text><text x="822" y="650" class="label" text-anchor="start">Commit a forecast</text><text x="822" y="679" class="body" text-anchor="start"><tspan x="822" dy="0">Link evidence and rationale to</tspan><tspan x="822" dy="22">a simulated probability update.</tspan></text><rect x="470" y="585" width="220" height="145" rx="22" fill="#162137" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><circle cx="498" cy="614" r="18" fill="#d1a76b"/><text x="498" y="621" class="num" text-anchor="middle">6</text><text x="524" y="609" class="tiny" text-anchor="start">LEARN</text><text x="492" y="650" class="label" text-anchor="start">Replay and calibrate</text><text x="492" y="679" class="body" text-anchor="start"><tspan x="492" dy="0">Review the event trail, then learn</tspan><tspan x="492" dy="22">which habits improved accuracy.</tspan></text><circle cx="800" cy="447" r="112" fill="#111b2c" stroke="#354663" stroke-width="2" filter="url(#shadow)"/><path d="M732 478 L732 415 L770 389 L807 414 L807 478 Z" fill="#486a70"/><rect x="749" y="432" width="15" height="20" fill="#ffc963"/><path d="M823 478 L823 430 L856 409 L885 428 L885 478 Z" fill="#5a5869"/><rect x="843" y="444" width="13" height="17" fill="#ffc963"/><path d="M706 488 Q800 452 901 488" stroke="#66d9db" stroke-width="3" fill="none" stroke-dasharray="5 10"/><text x="800" y="530" class="tiny" text-anchor="middle">THE WORLD IS THE MODEL</text></svg>