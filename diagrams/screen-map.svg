<text x="78" y="76" class="eyebrow">SIGNAL ATLAS · DESIGN DIAGRAM</text><text x="78" y="128" class="title">Primary Screen Anatomy</text><text x="78" y="163" class="sub">Five persistent layers keep the world playful while preserving analytical control.</text><rect x="90" y="220" width="1420" height="590" rx="20" fill="#0b111d" stroke="#354663" stroke-width="3" filter="url(#shadow)"/><rect x="90" y="220" width="1420" height="82" rx="20" fill="#162137"/><rect x="90" y="282" width="1420" height="20" fill="#162137"/><text x="125" y="258" class="eyebrow" text-anchor="start">1 · MARKET RIBBON</text><text x="125" y="284" class="body" text-anchor="start">Question · public probability · team belief · horizon · speed</text><rect x="90" y="302" width="260" height="424" fill="#111a2b" stroke="#354663"/><text x="120" y="345" class="eyebrow" text-anchor="start">2 · AGENT DOCK</text><text x="120" y="378" class="body" text-anchor="start"><tspan x="120" dy="0">Portraits and roles</tspan><tspan x="120" dy="30">location and task status</tspan><tspan x="120" dy="30">missions and runtime health</tspan></text><rect x="350" y="302" width="800" height="424" fill="#1a3550" stroke="#354663"/><path d="M350 548 L520 452 L670 535 L805 442 L970 530 L1150 470 L1150 726 L350 726 Z" fill="#315b52"/><path d="M790 535 L1150 470 L1150 726 L730 726 Z" fill="#1f5264" opacity=".8"/><rect x="470" y="500" width="76" height="66" fill="#586878"/><path d="M462 500 L508 472 L554 500 Z" fill="#765b52"/><rect x="498" y="526" width="19" height="22" fill="#d1a76b"/><rect x="620" y="430" width="76" height="66" fill="#586878"/><path d="M612 430 L658 402 L704 430 Z" fill="#765b52"/><rect x="648" y="456" width="19" height="22" fill="#66d9db"/><rect x="830" y="510" width="76" height="66" fill="#586878"/><path d="M822 510 L868 482 L914 510 Z" fill="#765b52"/><rect x="858" y="536" width="19" height="22" fill="#ffc963"/><rect x="990" y="410" width="76" height="66" fill="#586878"/><path d="M982 410 L1028 382 L1074 410 Z" fill="#765b52"/><rect x="1018" y="436" width="19" height="22" fill="#b49af4"/><text x="750" y="340" class="eyebrow" text-anchor="middle">3 · EXPLORABLE WORLD</text><text x="750" y="368" class="body" text-anchor="middle">Places · routes · weather · moving agents · ambient events</text><rect x="1150" y="302" width="360" height="424" fill="#111a2b" stroke="#354663"/><text x="1180" y="345" class="eyebrow" text-anchor="start">4 · SIGNAL RAIL</text><rect x="1178" y="375" width="304" height="74" rx="10" fill="#18243a" stroke="#f07872" stroke-opacity=".45"/><rect x="1178" y="375" width="4" height="74" rx="2" fill="#f07872"/><text x="1195" y="403" class="label" text-anchor="start">Crosswind advisory</text><text x="1195" y="427" class="tiny" text-anchor="start">source · impact · provenance</text><rect x="1178" y="467" width="304" height="74" rx="10" fill="#18243a" stroke="#7cdda2" stroke-opacity=".45"/><rect x="1178" y="467" width="4" height="74" rx="2" fill="#7cdda2"/><text x="1195" y="495" class="label" text-anchor="start">Operations scheduled</text><text x="1195" y="519" class="tiny" text-anchor="start">source · impact · provenance</text><rect x="1178" y="559" width="304" height="74" rx="10" fill="#18243a" stroke="#d1a76b" stroke-opacity=".45"/><rect x="1178" y="559" width="4" height="74" rx="2" fill="#d1a76b"/><text x="1195" y="587" class="label" text-anchor="start">Historical base rate</text><text x="1195" y="611" class="tiny" text-anchor="start">source · impact · provenance</text><rect x="90" y="726" width="1420" height="84" rx="0" fill="#121c2d"/><text x="125" y="761" class="eyebrow" text-anchor="start">5 · COMMAND DESK</text><rect x="310" y="746" width="940" height="40" rx="10" fill="#091420" stroke="#66d9db" stroke-opacity=".5"/><text x="338" y="772" class="body">› Ask Mira to compare the advisory with the launch notice</text><rect x="1270" y="746" width="190" height="40" rx="10" fill="url(#cyanGrad)"/><text x="1365" y="772" class="tiny" text-anchor="middle" fill="#081416">DISPATCH</text></svg>